"$schema" = 'https://starship.rs/config-schema.json'

# ─────────────────────────────────────────────────────────────────────────────
# PROMPT SHAPE
# ─────────────────────────────────────────────────────────────────────────────
# `format`        = the LEFT side, drawn in this order, top to bottom.
# `right_format`  = the RIGHT side of the SAME line (the ⑂ main in the screenshot).
# `add_newline`   = blank line between prompts. Off = tight, like the screenshot.
#
# The trailing \  on each line is a line-continuation: it joins the lines into one
# string WITHOUT a newline. The only real newline is $line_break, which drops the
# cursor onto a fresh second line so the → sits alone under the path.

add_newline = false

format = """\
$directory\
$git_status\
$cmd_duration\
$line_break\
$character\
"""

# RIGHT side of the prompt line — the far-right "⑂ main" from the screenshot.
# right_format can reference built-in modules and custom modules (${custom.name}).
right_format = """${custom.git_branch_right}"""

continuation_prompt = '▶▶ '

# ─────────────────────────────────────────────────────────────────────────────
# LEFT: directory  →  the blue ~/tmux-sessionx
# ─────────────────────────────────────────────────────────────────────────────
[directory]
format = "[$path](bold fg:#8be9fd) "   # #8be9fd = cyan-blue, matches the screenshot
truncate_to_repo = false               # show full ~/path, not just the repo root
truncation_length = 4
home_symbol = "~"

[git_status]
format = '[$all_status$ahead_behind](fg:#f5c2e7) '   # subtle pink status flags
ahead = '⇡${count}'
behind = '⇣${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
conflicted = '='
untracked = '?${count}'
modified = '!${count}'
staged = '+${count}'
stashed = '*${count}'
deleted = '✘${count}'

# ─────────────────────────────────────────────────────────────────────────────
# THE PROMPT CHARACTER  →  the green → (red on error), like the screenshot
# ─────────────────────────────────────────────────────────────────────────────
[character]
success_symbol = "[→](bold #a6e3a1)"   # green arrow on success
error_symbol   = "[→](bold #f38ba8)"   # red/pink arrow when last command failed
vimcmd_symbol  = "[←](bold #f9e2af)"   # yellow when in vi-normal mode

# ─────────────────────────────────────────────────────────────────────────────
# how long the last command took — appears only if it ran > 2s
# ─────────────────────────────────────────────────────────────────────────────
[cmd_duration]
min_time = 2000
format = "[ took $duration](fg:#fab387) "

# ─────────────────────────────────────────────────────────────────────────────
# RIGHT: the "⑂ main" shown on the far right of the prompt line.
# Starship's built-in git_branch can't be placed on the right twice, so we use a
# custom module: run `git branch --show-current` and render it with the ⑂ glyph.
# Referenced above as ${custom.git_branch_right}.
# ─────────────────────────────────────────────────────────────────────────────
[custom.git_branch_right]
description = "Right-aligned git branch with ⑂ glyph"
command = "git branch --show-current 2>/dev/null"
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
format = "[⑂ $output](bold fg:#cba6f7)"   # mauve/purple, matches the pastel ⑂ main
shell = ["bash", "--noprofile", "--norc"]
